<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>石头剪刀布 - 手势对战</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 加载遮罩 -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p id="loading-text">正在加载手势识别模型...</p>
    </div>

    <!-- 摄像头权限错误 -->
    <div id="camera-error" style="display:none;">
      <p>无法访问摄像头，请允许浏览器使用摄像头权限后刷新页面。</p>
    </div>

    <!-- 顶部分数栏 -->
    <header>
      <div class="score-side player-side">
        <span class="score-label">你</span>
        <span id="player-score" class="score-value">0</span>
      </div>
      <div class="score-center">
        <h1>石头剪刀布</h1>
        <div id="round-info"></div>
      </div>
      <div class="score-side computer-side">
        <span class="score-label">电脑</span>
        <span id="computer-score" class="score-value">0</span>
      </div>
    </header>

    <!-- 主对战区 -->
    <main>
      <div class="arena">
        <!-- 电脑（左） -->
        <div class="fighter fighter-computer">
          <div id="computer-display" class="gesture-display">
            <span class="gesture-emoji">🤖</span>
          </div>
          <div class="fighter-label">电脑</div>
        </div>

        <!-- VS 分隔 -->
        <div id="vs-badge" class="vs-badge">VS</div>

        <!-- 玩家（右） -->
        <div class="fighter fighter-player">
          <div class="gesture-display">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="overlay"></canvas>
            <div id="player-emoji" class="gesture-emoji-overlay" style="display:none;"></div>
          </div>
          <div class="fighter-label">你</div>
        </div>
      </div>

      <!-- 结果提示 -->
      <div id="result-banner" class="result-banner" style="display:none;"></div>

      <!-- 底部提示 -->
      <div id="hint-text" class="hint-text">举起手势开始对战</div>
    </main>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
